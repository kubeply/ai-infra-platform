---
# connection-secret-externalstore.yaml - projects workload Redis connection data.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-cache-connection
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: example-client-secrets
  target:
    name: app-cache-connection
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        host: app-cache.demo-redis.svc.cluster.local
        port: "6379"
        username: default
        password: "{{ .password }}"
        tlsEnabled: "false"
  data:
    - secretKey: password
      remoteRef:
        key: clients/example/redis/app-cache
        property: password
---
# connection-secret-externalstore.yaml - persistent standalone connection data.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-redis-connection
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: example-client-secrets
  target:
    name: app-redis-connection
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        host: app-redis.demo-redis.svc.cluster.local
        port: "6379"
        username: default
        password: "{{ .password }}"
        tlsEnabled: "false"
  data:
    - secretKey: password
      remoteRef:
        key: clients/example/redis/app-redis
        property: password
---
# connection-secret-externalstore.yaml - replicated Redis-compatible connection data.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
