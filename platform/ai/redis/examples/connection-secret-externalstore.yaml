    template:
      type: Opaque
      data:
        host: app-redis-ha.demo-redis.svc.cluster.local
        port: "6379"
        username: default
        password: "{{ .password }}"
        tlsEnabled: "false"
  data:
    - secretKey: password
      remoteRef:
        key: clients/example/redis/app-redis-ha
        property: password
