---
# sealed-secrets.yaml — Bitnami Sealed Secrets controller for ai-infra-platform.
#
# Enables GitOps-safe secret management: secrets are encrypted with kubeseal
# against the cluster's public key and committed to git as SealedSecret
# resources. The controller decrypts them into standard Kubernetes Secrets at
# apply time.
#
# Usage:
#   kubeseal --fetch-cert > pub-cert.pem                     # fetch cluster public key
#   kubeseal --cert pub-cert.pem -f secret.yaml -w sealed-secret.yaml
#   git add sealed-secret.yaml && git commit && git push     # safe to commit
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    # renovate: chart=sealed-secrets registryUrl=https://bitnami-labs.github.io/sealed-secrets
    targetRevision: "2.18.4"
    helm:
      releaseName: sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
