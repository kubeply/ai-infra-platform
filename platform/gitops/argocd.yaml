---
# argocd.yaml — ArgoCD self-management Application for ai-infra-platform.
#
# Once the root Application is applied, ArgoCD syncs this file and adopts the
# existing Helm release, managing ArgoCD itself via GitOps going forward.
#
# The chart version here must match the version used in
# platform-delivery/script/bootstrap-cluster.sh (ARGOCD_CHART_VERSION).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    # renovate: chart=argo-cd registryUrl=https://argoproj.github.io/argo-helm
    targetRevision: "9.4.15"
    helm:
      releaseName: argo-cd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: false  # Never prune ArgoCD's own resources
    syncOptions:
      - ServerSideApply=true
