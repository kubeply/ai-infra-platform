---
# kustomization.yaml — platform storage module entry point.
#
# Clusters opt into Layer 3 storage by referencing this directory once.
# It currently exposes the baseline Velero backup stack. Storage-oriented data
# service operators remain explicit opt-ins through their own subdirectories.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - velero/
