---
# credentials-eso.yaml — Materialize the Velero cloud credentials.
#
# Operators seed `platform-secrets/shared-storage` outside git. External
# Secrets copies the access keys into the `velero` namespace and renders the
# `cloud` file format expected by the Velero chart.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-credentials
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-kubernetes-store
  target:
    name: velero-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .accessKeyId }}
          aws_secret_access_key={{ .secretAccessKey }}
  data:
    - secretKey: accessKeyId
      remoteRef:
        key: shared-storage
        property: accessKeyId
    - secretKey: secretAccessKey
      remoteRef:
        key: shared-storage
        property: secretAccessKey
