---
# backup-credentials-externalstore.yaml - fetches object storage credentials.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-backup-object-store
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: example-client-secrets
  target:
    name: postgres-backup-object-store
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: clients/example/postgres/object-store
        property: access_key_id
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: clients/example/postgres/object-store
        property: secret_access_key
