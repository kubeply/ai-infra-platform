---
# access-role-externalstore.yaml - fetches credentials for a managed role.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-postgres-app-readwrite
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: example-client-secrets
  target:
    name: app-postgres-app-readwrite
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: clients/example/postgres/app-readwrite
        property: username
    - secretKey: password
      remoteRef:
        key: clients/example/postgres/app-readwrite
        property: password
