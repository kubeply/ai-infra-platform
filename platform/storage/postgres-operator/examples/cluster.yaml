---
# cluster.yaml - small opt-in PostgreSQL cluster declaration.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: app-postgres
spec:
  instances: 1

  bootstrap:
    initdb:
      database: app
      owner: app

  managed:
    roles:
      - name: app_readwrite
        ensure: present
        login: true
        passwordSecret:
          name: app-postgres-app-readwrite

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: app-postgres-object-store

  storage:
    size: 10Gi

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
