---
# kustomization.yaml — platform observability module entry point.
#
# Clusters opt into Layer 3 observability by referencing this directory once.
# It composes the monitoring and logging sub-components managed by ArgoCD.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - kube-prometheus-stack/
  - loki/
