---
# application.yaml — GitOps-managed logging stack and node-level collector.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      # renovate: datasource=helm depName=loki registryUrl=https://grafana.github.io/helm-charts
      targetRevision: "6.55.0"
      helm:
        releaseName: loki
        values: |
          deploymentMode: SingleBinary

          loki:
            auth_enabled: false
            commonConfig:
              replication_factor: 1
            schemaConfig:
              configs:
                - from: "2024-01-01"
                  store: tsdb
                  object_store: filesystem
                  schema: v13
                  index:
                    prefix: loki_index_
                    period: 24h
            storage:
              type: filesystem
            limits_config:
              retention_period: 168h
              ingestion_rate_mb: 4
              ingestion_burst_size_mb: 8

          singleBinary:
            replicas: 1
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
            persistence:
              enabled: true
              size: 10Gi
              storageClass: null

          backend:
            replicas: 0
          chunksCache:
            enabled: false
          gateway:
            enabled: false
          lokiCanary:
            enabled: false
          read:
            replicas: 0
          resultsCache:
            enabled: false
          test:
            enabled: false
          write:
            replicas: 0
    - repoURL: https://grafana.github.io/helm-charts
      chart: promtail
      # renovate: datasource=helm depName=promtail registryUrl=https://grafana.github.io/helm-charts
      targetRevision: "6.17.1"
      helm:
        releaseName: promtail
        values: |
          config:
            logLevel: info
            clients:
              - url: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
          serviceMonitor:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
