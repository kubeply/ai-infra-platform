<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D9E75;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#1D9E75;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#185FA5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#185FA5;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Accent dots -->
  <circle cx="150" cy="80" r="2" fill="#1D9E75" opacity="0.6"/>
  <circle cx="300" cy="120" r="2" fill="#185FA5" opacity="0.6"/>
  <circle cx="600" cy="80" r="2" fill="#534AB7" opacity="0.6"/>
  <circle cx="750" cy="40" r="2" fill="#1D9E75" opacity="0.4"/>

  <!-- Connection lines -->
  <line x1="150" y1="80" x2="300" y2="120" stroke="#1D9E75" stroke-width="0.5" opacity="0.3"/>
  <line x1="300" y1="120" x2="600" y2="80" stroke="#185FA5" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="80" x2="750" y2="40" stroke="#534AB7" stroke-width="0.5" opacity="0.3"/>

  <!-- Main title -->
  <text x="60" y="85" font-family="'SF Mono', 'Fira Code', monospace" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-0.5">ai-infra-platform</text>

  <!-- Subtitle -->
  <text x="62" y="115" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#5DCAA5" letter-spacing="1">production kubernetes infrastructure for ai startups</text>

  <!-- Bottom accent line -->
  <rect x="0" y="195" width="900" height="2" fill="url(#line)" rx="1"/>

  <!-- Right side badges -->
  <rect x="660" y="130" width="100" height="24" rx="4" fill="#1D9E7520" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="710" y="146" font-family="'SF Mono', monospace" font-size="10" fill="#5DCAA5" text-anchor="middle">terraform</text>

  <rect x="770" y="130" width="100" height="24" rx="4" fill="#185FA520" stroke="#185FA5" stroke-width="0.5"/>
  <text x="820" y="146" font-family="'SF Mono', monospace" font-size="10" fill="#85B7EB" text-anchor="middle">argocd</text>

  <rect x="660" y="162" width="100" height="24" rx="4" fill="#534AB720" stroke="#534AB7" stroke-width="0.5"/>
  <text x="710" y="178" font-family="'SF Mono', monospace" font-size="10" fill="#AFA9EC" text-anchor="middle">kubernetes</text>

  <rect x="770" y="162" width="100" height="24" rx="4" fill="#0F6E5620" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="820" y="178" font-family="'SF Mono', monospace" font-size="10" fill="#5DCAA5" text-anchor="middle">ai-native</text>
</svg>
