---
name: pr-validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which paths changed so unrelated jobs can be skipped.
  changes:
    runs-on: depot-ubuntu-24.04
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      yaml: ${{ steps.filter.outputs.yaml }}
      k8s: ${{ steps.filter.outputs.k8s }}
      shell: ${{ steps.filter.outputs.shell }}
      renovate: ${{ steps.filter.outputs.renovate }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
            yaml:
              - '**/*.yaml'
              - '**/*.yml'
            k8s:
              - 'platform/**'
              - 'clusters/**'
              - 'apps/**'
            shell:
              - 'script/**/*.sh'
              - '.github/**/*.sh'
            renovate:
              - 'renovate.json'
              - '.renovaterc'
              - '.renovaterc.json'
              - '.renovaterc.json5'
              - '.github/renovate.json5'

  # ── Terraform ──────────────────────────────────────────────────────────────

  terraform-fmt:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      - name: Check Terraform formatting
        run: terraform fmt -check -recursive ./terraform

  terraform-validate:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      - name: Validate hetzner-k3s module
        run: |
          terraform -chdir=terraform/modules/hetzner-k3s init -backend=false
          terraform -chdir=terraform/modules/hetzner-k3s validate
      - name: Validate shared/dns module
        run: |
          terraform -chdir=terraform/modules/shared/dns init -backend=false
          terraform -chdir=terraform/modules/shared/dns validate
      - name: Validate shared/storage module
        run: |
          terraform -chdir=terraform/modules/shared/storage init -backend=false
          terraform -chdir=terraform/modules/shared/storage validate

  terraform-plan:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - name: Prepare SSH key placeholder
        # A placeholder key is used so terraform validate/plan can parse the
        # configuration without requiring a real key on disk.
        run: |
          install -m 600 /dev/null /tmp/ci_ssh_key
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ci_ssh_key
      - name: Terraform init (hetzner-k3s)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HZ_OBJECT_STORAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HZ_OBJECT_STORAGE_SECRET_KEY }}
        run: terraform -chdir=terraform/modules/hetzner-k3s init
      - name: Terraform plan (hetzner-k3s)
        id: plan
        continue-on-error: true
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.HZ_OBJECT_STORAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HZ_OBJECT_STORAGE_SECRET_KEY }}
          TF_VAR_cluster_name: ci-plan
          TF_VAR_location: fsn1
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_existing_ssh_key_id: ${{ secrets.HCLOUD_SSH_KEY_ID }}
          TF_VAR_ssh_private_key_path: /tmp/ci_ssh_key
        run: |
          terraform -chdir=terraform/modules/hetzner-k3s plan \
            -detailed-exitcode \
            -no-color \
            2>&1 | tee /tmp/plan.txt
          # exit 0 = no changes, exit 2 = changes detected (both are success)
          EXIT="${PIPESTATUS[0]}"
          [ "$EXIT" -eq 1 ] && exit 1 || exit 0
      - name: Post plan as PR comment
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const raw = fs.existsSync('/tmp/plan.txt')
              ? fs.readFileSync('/tmp/plan.txt', 'utf8')
              : '(plan output not available)';
            const plan = raw.length > 60000
              ? raw.slice(0, 60000) + '\n...(truncated)'
              : raw;
            const outcome = '${{ steps.plan.outcome }}';
            const icon = outcome === 'success' ? '✅' : '❌';
            const body = [
              `## ${icon} Terraform Plan — hetzner-k3s`,
              '',
              `**Result:** \`${outcome}\``,
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            if (outcome === 'failure') {
              core.setFailed('Terraform plan failed — see comment above');
            }

  # ── YAML ───────────────────────────────────────────────────────────────────

  yaml-lint:
    needs: changes
    if: needs.changes.outputs.yaml == 'true'
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML files
        run: yamllint -c .yamllint.yaml .

  # ── Kubernetes ─────────────────────────────────────────────────────────────

  k8s-validate:
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    runs-on: depot-ubuntu-24.04
    env:
      # renovate: datasource=github-releases depName=yannh/kubeconform
      KUBECONFORM_VERSION: v0.8.0
      # Pinned k8s schema version — matches k3s v1.29.x target.
      K8S_SCHEMA_VERSION: 1.29.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install kubeconform
        run: |
          curl -sfLo /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          chmod +x /usr/local/bin/kubeconform
      - name: Validate Kubernetes manifests
        run: |
          {
            find platform/ clusters/ apps/ \
              -path 'platform/gitops/image-updater/examples/*' -prune \
              -o \( -name '*.yaml' -o -name '*.yml' \) -print
            find platform/gitops/image-updater/examples/ -name '*.yaml'
          } 2>/dev/null | xargs -r kubeconform \
                -strict \
                -ignore-missing-schemas \
                -kubernetes-version "${K8S_SCHEMA_VERSION}" \
                -summary

  # ── Shell ──────────────────────────────────────────────────────────────────

  shellcheck:
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          find script/ .github/ -name '*.sh' -print0 \
            | xargs -0 shellcheck --severity=warning

  # ── Renovate ───────────────────────────────────────────────────────────────

  renovate-config:
    needs: changes
    if: needs.changes.outputs.renovate == 'true'
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate Renovate config
        run: npx --yes -p renovate renovate-config-validator renovate.json
