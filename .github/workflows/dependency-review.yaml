---
name: dependency-review

on:
  pull_request:
    types: [opened, synchronize]

# Minimal permissions — read-only access to repository contents.
permissions:
  contents: read

jobs:
  # ── Dependency vulnerability scan ─────────────────────────────────────────
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          # Fail on HIGH or CRITICAL severity CVEs introduced by this PR.
          fail-on-severity: high

  # ── Action pin audit ───────────────────────────────────────────────────────
  action-pin-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch both the PR branch and the base so we can diff workflow files.
          fetch-depth: 0
      - name: Check for non-SHA-pinned actions in changed workflow files
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED=$(git diff --name-only \
            "origin/${{ github.base_ref }}...HEAD" \
            -- '.github/workflows/*.yaml' '.github/workflows/*.yml' \
            2>/dev/null || true)

          if [ -z "$CHANGED" ]; then
            echo "No workflow files changed — skipping pin check."
            exit 0
          fi

          FOUND=0
          for FILE in $CHANGED; do
            [ -f "$FILE" ] || continue
            # Match "uses: owner/repo@ref" where ref is NOT a 40-hex-char SHA.
            UNPINNED=$(grep -En 'uses:\s+[^@]+@[0-9a-zA-Z_/.-]{1,39}(\s|$)' \
              "$FILE" \
              | grep -Ev 'uses:\s+[^@]+@[0-9a-f]{40}' \
              || true)
            if [ -n "$UNPINNED" ]; then
              echo "::error file=${FILE}::Non-SHA-pinned action(s) found:"
              echo "${UNPINNED}"
              FOUND=1
            fi
          done

          if [ "$FOUND" -ne 0 ]; then
            echo ""
            echo "Pin all third-party actions to a full 40-character commit SHA."
            echo "Example:  uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2"
            exit 1
          fi

          echo "All actions in changed workflow files are SHA-pinned."
